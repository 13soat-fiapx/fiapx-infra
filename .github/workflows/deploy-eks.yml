name: Push to ECR and Deploy to EKS

on:
  workflow_call:
    inputs:
      environment:
        description: Deployment environment (dev|stg|prod)
        required: true
        type: string
      service-name:
        description: Name of the project to deploy
        required: true
        type: string
      path:
        description: Path to the Helm chart
        type: string
        default: ./k8s

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    concurrency:
      group: deploy-${{ inputs.environment }}
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Configure AWS Credentials
        id: aws-credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Check if ECR tag exists
        id: ecr_check
        uses: 13soat-fiapx/fiapx-infra/.github/actions/ecr-tag-exists@main
        with:
          environment: ${{ inputs.environment }}
          aws-region: ${{ vars.AWS_REGION }}
          service-name: ${{ inputs.service-name }}

      - name: Login to Amazon ECR
        if: steps.ecr_check.outputs.image-exists == 'false'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        if: steps.ecr_check.outputs.image-exists == 'false'
        id: setup-buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: steps.ecr_check.outputs.image-exists == 'false'
        id: build-push
        uses: docker/build-push-action@v5
        with:
          push: true
          tags:  |
            ${{ steps.login-ecr.outputs.registry }}/fiapx-${{ inputs.environment }}/${{ inputs.service-name }}-cr:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/fiapx-${{ inputs.environment }}/${{ inputs.service-name }}-cr:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Helm Chart
        id: helm-deploy
        run: |
          REPOSITORY_URI="${{ steps.aws-credentials.outputs.aws-account-id }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/fiapx-${{ inputs.environment }}/${{ inputs.service-name }}-cr"
          aws eks update-kubeconfig --name fiapx-${{ inputs.environment }}-cluster --region ${{ vars.AWS_REGION }}
          helm upgrade --install ${{ inputs.service-name }} ${{ inputs.path }} \
            --namespace ${{ inputs.service-name }} \
            --create-namespace \
            --set app.name=${{ inputs.service-name }} \
            --set image.repository=$REPOSITORY_URI \
            --set image.tag=${{ github.sha }} \
            --set app.env=${{ inputs.environment }}
