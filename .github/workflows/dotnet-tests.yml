name: Run tests

on:
  workflow_call:
    inputs:
      enable_sonar:
        description: Enable SonarQube analysis in this run.
        required: false
        type: boolean
        default: false
      sonar_project_key:
        description: SonarQube project key for the caller repository.
        required: false
        type: string
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Java
        if: inputs.enable_sonar
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          cache: true
          cache-dependency-path: |
            src/**/packages.lock.json
            tests/**/packages.lock.json
          global-json-file: global.json

      - name: Install SonarScanner for .NET
        if: inputs.enable_sonar
        run: dotnet tool update --global dotnet-sonarscanner

      - name: Restore dependencies
        run: dotnet restore --locked-mode

      - name: Validate SonarQube configuration
        if: inputs.enable_sonar
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ inputs.sonar_project_key }}
        run: |
          if [ -z "$SONAR_PROJECT_KEY" ] || [ -z "$SONAR_HOST_URL" ] || [ -z "$SONAR_TOKEN" ]; then
            echo "SonarQube habilitado, mas SONAR_PROJECT_KEY e/ou secrets SONAR_HOST_URL/SONAR_TOKEN nao foram definidos."
            exit 1
          fi

      - name: Start SonarQube analysis
        if: inputs.enable_sonar
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ inputs.sonar_project_key }}
        run: |
          dotnet sonarscanner begin /k:"$SONAR_PROJECT_KEY" /d:sonar.host.url="$SONAR_HOST_URL" /d:sonar.token="$SONAR_TOKEN" /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml" /d:sonar.qualitygate.wait=true

      - name: Build
        run: dotnet build --no-restore

      - name: Test
        if: ${{ !inputs.enable_sonar }}
        run: dotnet test --no-build --logger trx

      - name: Test with coverage
        if: inputs.enable_sonar
        run: dotnet test --no-build --logger trx --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      - name: End SonarQube analysis
        if: always() && inputs.enable_sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"

      - name: Publish test results
        uses: dorny/test-reporter@v2.1.1
        if: success() || failure()
        with:
          name: Tests
          path: tests/**/TestResults/*.trx
          reporter: dotnet-trx
